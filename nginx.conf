server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback (React Router использует History API)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статика с длинным кэшем
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html никогда не кэшируем — чтобы после deploy клиенты сразу увидели новую сборку
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
